version: '3.9'

services:
  # ========================================
  # MySQL Database
  # ========================================
  database:
    image: mysql:8.0
    container_name: todolist-db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: db_todolist_contactus
      MYSQL_USER: todolist_user
      MYSQL_PASSWORD: todolist_password
    ports:
      - "3306:3306"
    volumes:
      # Persiste dados da BD entre containers
      - mysql_data:/var/lib/mysql
    networks:
      - todolist_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # ========================================
  # Laravel Backend (PHP-FPM)
  # ========================================
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: todolist-backend
    depends_on:
      database:
        condition: service_healthy
    environment:
      APP_NAME: TodoList
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost:8000
      LOG_CHANNEL: stack
      DB_CONNECTION: mysql
      DB_HOST: database
      DB_PORT: 3306
      DB_DATABASE: db_todolist_contactus
      DB_USERNAME: todolist_user
      DB_PASSWORD: todolist_password
      SANCTUM_STATEFUL_DOMAINS: localhost,127.0.0.1
      SESSION_DOMAIN: .localhost
    volumes:
      # Mount código para desenvolvimento (opcional - remover em produção)
      - ./backend:/app
      - /app/vendor  # Não sobrescreve vendor instalado no container
      - /app/node_modules
    networks:
      - todolist_network

  # ========================================
  # Angular Frontend (Nginx)
  # ========================================
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: todolist-frontend
    depends_on:
      - backend
    networks:
      - todolist_network
    # Volumes comentados para produção
    # Descomente para desenvolvimento (hot-reload)
    # volumes:
    #   - ./frontend/frontend:/app
    #   - /app/node_modules
    #   - /app/dist

  # ========================================
  # Nginx Reverse Proxy (Gateway)
  # ========================================
  nginx:
    image: nginx:alpine
    container_name: todolist-proxy
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8000:80"
    networks:
      - todolist_network

# ========================================
# Volumes (Persistência de dados)
# ========================================
volumes:
  mysql_data:
    driver: local

# ========================================
# Networks (Comunicação entre containers)
# ========================================
networks:
  todolist_network:
    driver: bridge
