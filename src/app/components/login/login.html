<div class="login-page">

  <!-- LEFT: image panel -->
  <div class="login-image">
    <div class="login-image-overlay">
      <span class="material-symbols-rounded brand-icon">check_circle</span>
      <h2>Organiza o teu dia</h2>
      <p>Gere as tuas tarefas de forma simples e eficiente.</p>
    </div>
  </div>

  <!-- RIGHT: form panel -->
  <div class="login-form-panel">
    <div class="login-form-container">

      <div class="login-header">
        <h1>Bem-vindo de volta</h1>
        <p>Inicia sessão para aceder às tuas tarefas</p>
      </div>

      <div class="form-group">
        <label>Utilizador</label>
        <div class="input-wrapper">
          <span class="material-symbols-rounded">person</span>
          <input type="text" placeholder="O teu utilizador" [(ngModel)]="username" />
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <span class="material-symbols-rounded">lock</span>
          <input type="password" placeholder="A tua password" [(ngModel)]="password" />
        </div>
      </div>

      <button class="btn-login" (click)="login()" [disabled]="!username.trim() || !password.trim()">
        <span class="material-symbols-rounded">login</span>
        Entrar
      </button>

      <div class="divider"><span>ou</span></div>

      <button class="btn-register" (click)="register()">
        <span class="material-symbols-rounded">person_add</span>
        Criar conta
      </button>

      <p class="login-hint">
        <span class="material-symbols-rounded">info</span>
        Usa <strong>user</strong> / <strong>password</strong> para entrar
      </p>

    </div>
  </div>

</div>
