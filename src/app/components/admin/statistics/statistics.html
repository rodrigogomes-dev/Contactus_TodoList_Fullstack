<section class="admin-page">
  
  <div class="admin-header">
    <h2>Estatísticas Globais</h2>
    <p>Acompanha o crescimento da plataforma e o registo de novos utilizadores.</p>
  </div>

  <div class="stats-overview">
    <div class="stat-card">
      <span class="material-symbols-rounded stat-icon">group_add</span>
      <div class="stat-value">{{ totalUsers() }}</div>
      <div class="stat-label">Registos neste período</div>
    </div>
    
    <div class="stat-card">
      <span class="material-symbols-rounded stat-icon">trending_up</span>
      <div class="stat-value">{{ maxInADay() }}</div>
      <div class="stat-label">Pico Máximo num único dia</div>
    </div>
  </div>

  <div class="chart-container-card">
    <div class="chart-header">
      <h3>Crescimento ao Longo do Tempo</h3>
      
      <div class="filter-group">
        <label for="year-filter">
          <span class="material-symbols-rounded">date_range</span>
          Ano
        </label>
        <select id="year-filter" [ngModel]="selectedYear()" (ngModelChange)="onYearChange($event)">
          <option *ngFor="let year of availableYears()" [value]="year">{{ year }}</option>
        </select>
      </div>
    </div>

    <div class="canvas-wrapper">
      <div *ngIf="isLoading()" class="loading-spinner">
        <span class="material-symbols-rounded spin">hourglass_empty</span>
        <p>Carregando dados...</p>
      </div>
      <div *ngIf="error()" class="error-message">
        <span class="material-symbols-rounded">error</span>
        <p>{{ error() }}</p>
      </div>
      <canvas *ngIf="!isLoading() && !error()" baseChart
        [data]="lineChartData()"
        [options]="lineChartOptions"
        [type]="lineChartType">
      </canvas>
    </div>
  </div>

</section>
