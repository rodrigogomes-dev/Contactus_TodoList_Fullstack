@if (isLandingPage()) {
  <router-outlet></router-outlet>
} @else if (auth.authenticated() && !isPublicPage()) {
  <app-shell
    [menuOpen]="menuOpen()"
    [role]="auth.role()"
    (menuToggled)="toggleMenu()"
    (logoutClicked)="logout()"
  >
    <router-outlet></router-outlet>
  </app-shell>
} @else {
  <!-- Páginas públicas (login, register, etc.) com header e footer simples -->
  <header>
    <div class="header-left">
      <div class="header-brand">
        <span class="material-symbols-rounded">check_circle</span>
        <h1>Todo List App</h1>
      </div>
    </div>
    <div class="header-right">
      <span class="header-badge">Angular 19</span>
    </div>
  </header>
  <router-outlet></router-outlet>
  <footer>
    <p>Desenvolvido por Rodrigo Gomes - Contexto Formativo Estágio Contactus - 2026</p>
  </footer>
}
