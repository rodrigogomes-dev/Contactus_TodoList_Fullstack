<header>
  <div class="header-left">
    <button class="hamburger" (click)="toggleMenu()" [class.active]="menuOpen()">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div class="header-brand">
      <span class="material-symbols-rounded">check_circle</span>
      <h1>Todo List App</h1>
    </div>
  </div>
  <div class="header-right">
    <span class="header-badge">Angular 19</span>
  </div>
</header>

<main>
  <aside [class.open]="menuOpen()">
    <h2>Menu</h2>
    <nav class="menu-nav">
      <!-- ✅ routerLink em vez de (click) -->
      <!-- routerLinkActive="active" marca o link ativo -->
      <a 
        routerLink="/tarefas-abertas"
        routerLinkActive="active"
        (click)="toggleMenu()">
        <span class="material-symbols-rounded">assignment</span>
        Tarefas Abertas
      </a>
      
      <a 
        routerLink="/tarefas-concluidas"
        routerLinkActive="active"
        (click)="toggleMenu()">
        <span class="material-symbols-rounded">task_alt</span>
        Tarefas Concluídas
      </a>
    </nav>
  </aside>

  <!-- 🎯 Router renderiza TaskListComponent aqui -->
  <router-outlet></router-outlet>
</main>

<footer>
  <p>Desenvolvido por Rodrigo Gomes - Contexto Formativo Estágio Contactus - 2026</p>
</footer>
