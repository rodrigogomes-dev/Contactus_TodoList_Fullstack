<header>
  <h1>Todo List App</h1>
</header>

<main>
  <aside>
    <h2>Menu</h2>
    <!-- Pode adicionar links de navegação aqui no futuro -->
  </aside>

  <section>
    <h2>Lista de Tarefas</h2>

    <!-- Formulário para adicionar tarefa -->
    <div class="task-form-container">
      <label for="taskInput">Nova Tarefa:</label>
      <input
        type="text"
        id="taskInput"
        placeholder="O que precisa de ser feito hoje?"
        [(ngModel)]="newTask"
        (keyup.enter)="addTask()"
      >
      <button (click)="addTask()" [disabled]="newTask.trim() === ''">Adicionar +</button>
    </div>

    <!-- Container da Lista de Tarefas -->
    <div class="task-list-container">
      @for (task of tasks(); track task.id) {
        <div class="task-card">
          <div class="task-info">
            <input
              type="checkbox"
              [checked]="task.completed"
              (change)="toggleComplete(task.id)"
            >
            <label [class.completed]="task.completed">{{ task.name }}</label>
          </div>
          <div class="task-actions">
            <!-- O botão de editar pode ser implementado no futuro -->
            <button class="delete-button" (click)="deleteTask(task.id)">Excluir</button>
          </div>
        </div>
      } @empty {
        <p>Parabéns, não há tarefas pendentes!</p>
      }
    </div>

  </section>
</main>

<footer>
  <p>Desenvolvido por Rodrigo Gomes - Contexto Formativo Estágio Contactus - 2026</p>
</footer>
