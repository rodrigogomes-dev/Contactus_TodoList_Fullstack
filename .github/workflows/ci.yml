name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-tests:
    name: Backend Tests (Laravel + PHPUnit)
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        php-version: ['8.3']
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: test_db
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring,xml,dom,sqlite3,pdo_sqlite,pdo_mysql
          tools: composer:v2
          coverage: xdebug

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install backend dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist

      - name: Copy .env.example to .env
        working-directory: backend
        run: cp .env.example .env || echo "DATABASE_URL=sqlite:///:memory:" > .env

      - name: Generate Laravel app key
        working-directory: backend
        run: php artisan key:generate

      - name: Run PHPUnit tests
        working-directory: backend
        run: npm run test

      - name: Check for PHP syntax errors
        working-directory: backend
        run: |
          php -l app/Http/Controllers/*.php
          php -l app/Models/*.php
          php -l app/Observers/*.php
        continue-on-error: true

  frontend-tests:
    name: Frontend Tests (Angular + Vitest)
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: frontend/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend/frontend
        run: npm ci

      - name: Run Vitest tests
        working-directory: frontend/frontend
        run: npm run test

      - name: Build frontend (AOT)
        working-directory: frontend/frontend
        run: npm run build -- --configuration production

      - name: Check for TypeScript errors
        working-directory: frontend/frontend
        run: npx tsc --noEmit
        continue-on-error: true

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: frontend/frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend/frontend
        run: npm ci

      - name: Check for linting issues
        working-directory: frontend/frontend
        run: npm run lint || echo "No lint script configured"
        continue-on-error: true

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring,xml,dom

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        working-directory: backend
        run: composer install --no-interaction

      - name: Check PHP Code Standards
        working-directory: backend
        run: composer phpcs || echo "phpcs not configured"
        continue-on-error: true

  security-check:
    name: Security & Dependency Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring,xml,dom

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        working-directory: backend
        run: composer install --no-interaction

      - name: Check for PHP security vulnerabilities
        working-directory: backend
        run: composer audit || echo "php audit not available"
        continue-on-error: true

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: frontend/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend/frontend
        run: npm ci

      - name: Check for npm security vulnerabilities
        working-directory: frontend/frontend
        run: npm audit --audit-level=moderate || echo "Some vulnerabilities found - review before merge"
        continue-on-error: true

  test-results:
    name: Summarize Test Results
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: always()
    
    steps:
      - name: Backend tests status
        run: |
          if [ "${{ needs.backend-tests.result }}" == "success" ]; then
            echo "✅ Backend tests PASSED"
          else
            echo "❌ Backend tests FAILED"
            exit 1
          fi

      - name: Frontend tests status
        run: |
          if [ "${{ needs.frontend-tests.result }}" == "success" ]; then
            echo "✅ Frontend tests PASSED"
          else
            echo "❌ Frontend tests FAILED"
            exit 1
          fi

      - name: All checks passed
        run: echo "🎉 Pipeline completed successfully!"
