upstream backend_fpm {
    server backend:9000;
}

upstream frontend_web {
    server frontend:80;
}

# ========================================
# Frontend Server (Port 4200)
# ========================================
server {
    listen 4200;
    server_name localhost;
    client_max_body_size 50M;
    
    # Compressão Gzip para scripts carregarem mais rápido
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        proxy_pass http://frontend_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Permitir carregamento de scripts externos (Iconify/Three)
        add_header Access-Control-Allow-Origin *;
    }

    # Rota da API para o Frontend
    location /api/ {
        fastcgi_pass backend_fpm;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /app/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        
        fastcgi_param HTTP_HOST $http_host;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;
    }

    # Servir imagens e ficheiros do storage diretamente (sem symlinks)
    location /storage/ {
        alias /app/storage/;
        try_files $uri =404;
    }
}

# ========================================
# Backend API Server (Port 8000)
# ========================================
server {
    listen 8000;
    server_name localhost;

    client_max_body_size 50M;

    root /app/public;
    index index.php;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass backend_fpm;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        
        fastcgi_param HTTP_HOST $http_host;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
    }

    # Servir imagens e ficheiros do storage diretamente
    location /storage/ {
        alias /app/storage/;
        try_files $uri =404;
    }

    # Health Check
    location /health {
        access_log off;
        return 200 "OK\n";
    }
}

