upstream backend_fpm {
    # PHP-FPM está na porta 9000 dentro do container
    server backend:9000;
}

upstream frontend_web {
    # Frontend Nginx está na porta 80 dentro do container
    server frontend:80;
}

server {
    listen 80;
    server_name localhost;

    client_max_body_size 50M;

    # ========================================
    # API Backend Routing via FastCGI
    # ========================================
    location /api/ {
        # Remove /api do path antes de passar ao Laravel
        rewrite ^/api/(.*)$ /$1 break;
        
        # Pass para PHP-FPM via FastCGI
        fastcgi_pass backend_fpm;
        
        # Headers FastCGI necessários
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /app/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        
        # Headers HTTP standard
        fastcgi_set_header Host $host;
        fastcgi_set_header X-Real-IP $remote_addr;
        fastcgi_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        fastcgi_set_header X-Forwarded-Proto $scheme;
        
        # Headers adicionais
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
        
        # Timeout para requests longos
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 60s;
        fastcgi_read_timeout 60s;
    }

    # ========================================
    # Frontend SPA Routing
    # ========================================
    location / {
        proxy_pass http://frontend_web;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========================================
    # Health Check
    # ========================================
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}

